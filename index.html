<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data App</title>
    <link rel="manifest" href="manifest.json">
    <script>
        // PWA "Infinite Install" Fix: Redirect immediately if already installed
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            window.location.replace('app.html');
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            text-align: center;
        }
        
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 350px;
            transition: transform 0.3s ease;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #0056b3;
            border-radius: 15px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,86,179,0.3);
        }

        h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 30px; font-size: 15px; line-height: 1.5; }

        .btn {
            background: #0056b3;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .btn:active { transform: scale(0.98); }
        .btn-success { background: #28a745; display: none; }
        .status { margin-top: 15px; font-size: 14px; color: #28a745; display: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">ID</div>
        <h1>Student Data App</h1>
        <p>Install this app on your phone to collect student data and photos offline.</p>
        
        <button class="btn" id="installBtn" style="display: none;">📲 Install App</button>
        <button class="btn btn-success" id="openBtn">🚀 Open App</button>
        <div class="status" id="statusText"></div>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const openBtn = document.getElementById('openBtn');
        const statusText = document.getElementById('statusText');

        // 1. CHECK IF ALREADY INSTALLED
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            installBtn.style.display = 'none';
            openBtn.style.display = 'block';
        }

        // 2. LISTEN FOR INSTALL PROMPT
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
            openBtn.style.display = 'none';
        });

        // 3. HANDLE INSTALL CLICK
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            installBtn.textContent = 'Installing...';
            deferredPrompt.prompt();
            
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('User accepted the install prompt');
            } else {
                console.log('User dismissed the install prompt');
                installBtn.textContent = "📲 Install App"; 
            }
            deferredPrompt = null;
        });

        // 4. LISTEN FOR SUCCESSFUL INSTALL
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            openBtn.style.display = 'block';
            statusText.style.display = 'block';
            statusText.textContent = "✅ App Installed Successfully!";
            
            setTimeout(() => {
                window.location.href = 'app.html';
            }, 1500);
        });

        // 5. HANDLE OPEN CLICK
        openBtn.addEventListener('click', () => {
            window.location.href = 'app.html';
        });

        // 6. REGISTER SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
